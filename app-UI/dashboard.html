<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RunPulse Dashboard - 통합 대시보드</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #fff;
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .logo { font-size: 24px; font-weight: bold; color: #00d4ff; }
        .nav-icons { display: flex; gap: 20px; }
        .nav-icon {
            width: 40px; height: 40px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.3s;
        }
        .nav-icon:hover { background: rgba(255,255,255,0.2); }
        
        /* Score Cards Row */
        .score-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }
        
        .score-card {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 24px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.3s;
        }
        .score-card:hover { transform: translateY(-5px); }
        
        .score-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .score-title { font-size: 14px; color: rgba(255,255,255,0.7); }
        .score-value {
            font-size: 48px;
            font-weight: bold;
            background: linear-gradient(135deg, #00d4ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        /* Gauge Chart */
        .gauge-container {
            position: relative;
            width: 200px;
            height: 100px;
            margin: 20px auto;
        }
        .gauge-bg {
            width: 200px; height: 100px;
            background: conic-gradient(from 180deg, #ff4444 0deg, #ffaa00 60deg, #00ff88 120deg, transparent 180deg);
            border-radius: 100px 100px 0 0;
            mask: radial-gradient(circle at 50% 100%, transparent 60%, black 61%);
            -webkit-mask: radial-gradient(circle at 50% 100%, transparent 60%, black 61%);
        }
        .gauge-needle {
            position: absolute;
            bottom: 0; left: 50%;
            width: 4px; height: 80px;
            background: #fff;
            transform-origin: bottom center;
            transform: translateX(-50%) rotate(-30deg);
            border-radius: 2px;
        }
        
        /* Radar Chart */
        .radar-container {
            width: 300px; height: 300px;
            margin: 20px auto;
            position: relative;
        }
        .radar-svg {
            width: 100%; height: 100%;
        }
        
        /* Chart Container */
        .chart-container {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 24px;
            margin: 20px 0;
        }
        .chart-title {
            font-size: 18px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .chart-title::before {
            content: '';
            width: 4px; height: 20px;
            background: linear-gradient(135deg, #00d4ff, #00ff88);
            border-radius: 2px;
        }
        
        /* Activity Cards */
        .activity-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .activity-card {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 20px;
            display: grid;
            grid-template-columns: 80px 1fr auto;
            gap: 16px;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .activity-card:hover {
            background: rgba(255,255,255,0.1);
        }
        .activity-map {
            width: 80px; height: 80px;
            background: linear-gradient(135deg, #2d3a4a, #1a1a2e);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
        }
        .activity-info h3 { font-size: 16px; margin-bottom: 8px; }
        .activity-meta {
            display: flex;
            gap: 16px;
            font-size: 14px;
            color: rgba(255,255,255,0.7);
        }
        .activity-badges {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        .badge-utrs { background: rgba(0, 212, 255, 0.2); color: #00d4ff; }
        .badge-cirs { background: rgba(255, 68, 68, 0.2); color: #ff4444; }
        .badge-fearp { background: rgba(0, 255, 136, 0.2); color: #00ff88; }
        
        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: rgba(26, 26, 46, 0.95);
            backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255,255,255,0.1);
            padding: 12px 0;
        }
        .nav-items {
            display: flex;
            justify-content: space-around;
            max-width: 600px;
            margin: 0 auto;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px 16px;
            cursor: pointer;
            color: rgba(255,255,255,0.6);
            transition: all 0.3s;
        }
        .nav-item.active { color: #00d4ff; }
        .nav-item:hover { color: #fff; }
        .nav-item-icon { font-size: 24px; }
        .nav-item-label { font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="logo">🏃‍♂️ RunPulse</div>
            <div class="nav-icons">
                <div class="nav-icon">🔍</div>
                <div class="nav-icon">🔔</div>
                <div class="nav-icon">👤</div>
            </div>
        </div>
        
        <!-- Score Cards -->
        <div class="score-row">
            <!-- UTRS Card -->
            <div class="score-card">
                <div class="score-header">
                    <span class="score-title">통합 훈련 준비도 (UTRS)</span>
                    <span style="color: #00ff88;">● 준비됨</span>
                </div>
                <div class="gauge-container">
                    <div class="gauge-bg"></div>
                    <div class="gauge-needle" style="transform: translateX(-50%) rotate(-10deg);"></div>
                </div>
                <div class="score-value">85</div>
                <p style="text-align: center; color: rgba(255,255,255,0.7); font-size: 14px; margin-top: 10px;">
                    고강도 훈련 최적 상태
                </p>
            </div>
            
            <!-- CIRS Card -->
            <div class="score-card">
                <div class="score-header">
                    <span class="score-title">부상 위험도 (CIRS)</span>
                    <span style="color: #00ff88;">● 안전</span>
                </div>
                <div class="gauge-container">
                    <div class="gauge-bg" style="background: conic-gradient(from 180deg, #00ff88 0deg, #00ff88 30deg, #ffaa00 60deg, #ff4444 120deg, transparent 180deg);"></div>
                    <div class="gauge-needle" style="transform: translateX(-50%) rotate(-60deg);"></div>
                </div>
                <div class="score-value" style="background: linear-gradient(135deg, #00ff88, #00aa88); -webkit-background-clip: text;">15</div>
                <p style="text-align: center; color: rgba(255,255,255,0.7); font-size: 14px; margin-top: 10px;">
                    ACWR: 0.95 (스위트 스팟)
                </p>
            </div>
        </div>
        
        <!-- Radar Chart -->
        <div class="chart-container">
            <div class="chart-title">러너 성숙도 레이더 (RMR)</div>
            <div class="radar-container">
                <svg class="radar-svg" viewBox="0 0 300 300">
                    <!-- Background grid -->
                    <polygon points="150,50 230,100 230,200 150,250 70,200 70,100" 
                             fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
                    <polygon points="150,75 207,112 207,187 150,225 93,187 93,112" 
                             fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
                    <polygon points="150,100 185,125 185,175 150,200 115,175 115,125" 
                             fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
                    
                    <!-- Axes -->
                    <line x1="150" y1="150" x2="150" y2="50" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
                    <line x1="150" y1="150" x2="230" y2="100" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
                    <line x1="150" y1="150" x2="230" y2="200" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
                    <line x1="150" y1="150" x2="150" y2="250" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
                    <line x1="150" y1="150" x2="70" y2="200" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
                    <line x1="150" y1="150" x2="70" y2="100" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
                    
                    <!-- Data polygon -->
                    <polygon points="150,70 215,110 220,190 150,230 80,190 85,110" 
                             fill="rgba(0, 212, 255, 0.3)" 
                             stroke="#00d4ff" stroke-width="2"/>
                    
                    <!-- Labels -->
                    <text x="150" y="40" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="12">유산소 용량</text>
                    <text x="240" y="95" text-anchor="start" fill="rgba(255,255,255,0.7)" font-size="12">역치 강도</text>
                    <text x="240" y="210" text-anchor="start" fill="rgba(255,255,255,0.7)" font-size="12">지구력</text>
                    <text x="150" y="265" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="12">동작 효율성</text>
                    <text x="60" y="210" text-anchor="end" fill="rgba(255,255,255,0.7)" font-size="12">회복력</text>
                    <text x="60" y="95" text-anchor="end" fill="rgba(255,255,255,0.7)" font-size="12">경제성</text>
                </svg>
            </div>
        </div>
        
        <!-- PMC Chart -->
        <div class="chart-container">
            <div class="chart-title">훈련 부하 추세 (PMC)</div>
            <svg width="100%" height="200" viewBox="0 0 800 200" preserveAspectRatio="none">
                <!-- Grid lines -->
                <line x1="0" y1="50" x2="800" y2="50" stroke="rgba(255,255,255,0.1)" stroke-dasharray="5,5"/>
                <line x1="0" y1="100" x2="800" y2="100" stroke="rgba(255,255,255,0.1)" stroke-dasharray="5,5"/>
                <line x1="0" y1="150" x2="800" y2="150" stroke="rgba(255,255,255,0.1)" stroke-dasharray="5,5"/>
                
                <!-- CTL (Fitness) - Green -->
                <path d="M0,120 Q100,110 200,100 T400,90 T600,85 T800,80" 
                      fill="none" stroke="#00ff88" stroke-width="3"/>
                
                <!-- ATL (Fatigue) - Red -->
                <path d="M0,150 Q100,140 200,120 T400,100 T600,90 T800,85" 
                      fill="none" stroke="#ff4444" stroke-width="3"/>
                
                <!-- TSB (Form) - Blue -->
                <path d="M0,100 Q100,90 200,85 T400,80 T600,75 T800,70" 
                      fill="none" stroke="#00d4ff" stroke-width="3"/>
                
                <!-- Legend -->
                <text x="650" y="30" fill="#00ff88" font-size="12">● CTL (Fitness)</text>
                <text x="650" y="50" fill="#ff4444" font-size="12">● ATL (Fatigue)</text>
                <text x="650" y="70" fill="#00d4ff" font-size="12">● TSB (Form)</text>
            </svg>
        </div>
        
        <!-- Activity List -->
        <div class="chart-container">
            <div class="chart-title">최근 활동</div>
            <div class="activity-list">
                <div class="activity-card">
                    <div class="activity-map">🗺️</div>
                    <div class="activity-info">
                        <h3>오늘의 훈련</h3>
                        <div class="activity-meta">
                            <span>📅 오늘</span>
                            <span>🏃‍♂️ 10.5km</span>
                            <span>⏱️ 5:30/km</span>
                            <span>⏰ 58분</span>
                        </div>
                    </div>
                    <div class="activity-badges">
                        <span class="badge badge-utrs">UTRS +5</span>
                        <span class="badge badge-fearp">FEARP 5:15</span>
                    </div>
                </div>
                <div class="activity-card">
                    <div class="activity-map">🗺️</div>
                    <div class="activity-info">
                        <h3>어제의 훈련</h3>
                        <div class="activity-meta">
                            <span>📅 어제</span>
                            <span>🏃‍♂️ 8.2km</span>
                            <span>⏱️ 5:45/km</span>
                            <span>⏰ 47분</span>
                        </div>
                    </div>
                    <div class="activity-badges">
                        <span class="badge badge-utrs">UTRS +3</span>
                        <span class="badge badge-cirs">CIRS ↓</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <div class="nav-items">
            <div class="nav-item active">
                <span class="nav-item-icon">🏠</span>
                <span class="nav-item-label">홈</span>
            </div>
            <div class="nav-item">
                <span class="nav-item-icon">📊</span>
                <span class="nav-item-label">활동</span>
            </div>
            <div class="nav-item">
                <span class="nav-item-icon">📅</span>
                <span class="nav-item-label">훈련</span>
            </div>
            <div class="nav-item">
                <span class="nav-item-icon">🤖</span>
                <span class="nav-item-label">AI 코치</span>
            </div>
            <div class="nav-item">
                <span class="nav-item-icon">⚙️</span>
                <span class="nav-item-label">설정</span>
            </div>
        </div>
    </div>
</body>
</html>
