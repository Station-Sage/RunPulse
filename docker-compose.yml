services:
  runpulse:
    build: .
    ports:
      - "80:18080"
    volumes:
      # 소스코드 전체 마운트 (code-server에서 편집 → 즉시 반영)
      - .:/app
      # 호스트 .venv가 컨테이너 패키지를 덮어쓰지 않도록 익명 볼륨으로 격리
      - /app/.venv
    environment:
      - FLASK_HOST=0.0.0.0
      - FLASK_DEBUG=1
    restart: unless-stopped
