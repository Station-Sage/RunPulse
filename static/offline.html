<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#1a1a2e">
  <title>오프라인 — RunPulse</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans KR', -apple-system, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .icon { font-size: 4rem; margin-bottom: 1.5rem; }
    h1 { font-size: 1.5rem; margin-bottom: 0.75rem; }
    p { color: rgba(255,255,255,0.7); font-size: 0.95rem; line-height: 1.6; max-width: 360px; }
    .retry-btn {
      margin-top: 2rem;
      background: linear-gradient(135deg, #00d4ff, #00ff88);
      color: #000;
      border: none;
      padding: 12px 32px;
      border-radius: 24px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      text-decoration: none;
    }
    .retry-btn:hover { opacity: 0.9; }
    .hint {
      margin-top: 1.5rem;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.4);
    }
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>오프라인 상태입니다</h1>
  <p>인터넷 연결을 확인해 주세요.<br>연결이 복구되면 자동으로 최신 데이터를 불러옵니다.</p>
  <a href="/" class="retry-btn" onclick="location.reload(); return false;">다시 시도</a>
  <div class="hint">캐시된 페이지가 있으면 자동으로 표시됩니다</div>
</body>
</html>
